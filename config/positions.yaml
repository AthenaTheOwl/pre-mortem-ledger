# Registered positions for the pre-mortem rotation.
#
# `exposure_tier` is one of:
#   concentrated — the position the monthly runner picks by default
#   sized        — a normally-weighted position; eligible for quarterly
#   probe        — a starter / option-like position; rarely scored
#
# `since` is the YYYY-MM the position first entered the book at this tier.
# When two concentrated rows tie, the runner picks the longer-held one.

